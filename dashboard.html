<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Shepherd Dashboard</title>
<style>
:root {
  --bg: #1a1a2e;
  --surface: #16213e;
  --card: #0f3460;
  --text: #e0e0e0;
  --muted: #888;
  --green: #4ade80;
  --yellow: #facc15;
  --red: #f87171;
  --green-bg: rgba(74,222,128,0.08);
  --yellow-bg: rgba(250,204,21,0.08);
  --red-bg: rgba(248,113,113,0.08);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Header */
.header {
  padding: 16px 24px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  display: flex;
  align-items: center;
  gap: 16px;
  flex-shrink: 0;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: -0.5px;
}

.indicator {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: var(--muted);
  transition: background 0.4s, box-shadow 0.4s;
}

.indicator.far { background: var(--green); box-shadow: 0 0 10px var(--green); }
.indicator.near { background: var(--yellow); box-shadow: 0 0 10px var(--yellow); }
.indicator.cliff { background: var(--red); box-shadow: 0 0 10px var(--red); }

.header-meta {
  flex: 1;
  min-width: 0;
}

.goal {
  font-size: 13px;
  color: var(--muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  cursor: pointer;
}

.goal:hover { color: var(--text); }

.phase {
  font-size: 12px;
  color: var(--muted);
  opacity: 0.7;
  margin-top: 2px;
}

.ratio-bar-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
}

.ratio-bar {
  width: 140px;
  height: 8px;
  border-radius: 4px;
  background: rgba(255,255,255,0.05);
  overflow: hidden;
  display: flex;
}

.ratio-bar .seg { height: 100%; transition: width 0.4s; }
.ratio-bar .seg.far { background: var(--green); }
.ratio-bar .seg.near { background: var(--yellow); }
.ratio-bar .seg.cliff { background: var(--red); }

.ratio-label {
  font-size: 11px;
  color: var(--muted);
  font-variant-numeric: tabular-nums;
}

.active-badge {
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 12px;
  background: rgba(74,222,128,0.15);
  color: var(--green);
  font-weight: 600;
  flex-shrink: 0;
}

.active-badge.off {
  background: rgba(255,255,255,0.05);
  color: var(--muted);
}

/* Sheep */
.sheep-wrap {
  flex-shrink: 0;
  font-family: "Consolas", "Courier New", monospace;
  font-size: 11px;
  line-height: 1.2;
  white-space: pre;
  color: var(--text);
  transition: color 0.4s;
  position: relative;
  min-width: 180px;
  text-align: left;
}

.sheep-wrap.far { color: var(--green); }
.sheep-wrap.near { color: var(--yellow); }
.sheep-wrap.cliff { color: var(--red); }

.sheep-wrap.cliff {
  animation: shake 0.15s infinite;
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-2px); }
  75% { transform: translateX(2px); }
}

.sheep-ground {
  font-size: 10px;
  color: var(--muted);
  opacity: 0.4;
}

/* Tabs */
.tabs {
  display: flex;
  padding: 0 24px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  flex-shrink: 0;
}

.tab {
  padding: 10px 18px;
  font-size: 13px;
  color: var(--muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: color 0.2s, border-color 0.2s;
  user-select: none;
}

.tab:hover { color: var(--text); }
.tab.active { color: var(--text); border-bottom-color: var(--green); }

/* Main content area */
.main {
  flex: 1;
  min-height: 0;
  display: flex;
}

/* View containers */
.view { display: none; flex: 1; min-height: 0; }
.view.active { display: flex; }

/* Board view */
.board {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 0;
  flex: 1;
}

.column {
  display: flex;
  flex-direction: column;
  border-right: 1px solid rgba(255,255,255,0.04);
  overflow: hidden;
}

.column:last-child { border-right: none; }

.column-header {
  padding: 12px 18px;
  font-size: 13px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 8px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  flex-shrink: 0;
}

.column-header .dot { width: 8px; height: 8px; border-radius: 50%; }
.column.far .column-header .dot { background: var(--green); }
.column.near .column-header .dot { background: var(--yellow); }
.column.cliff .column-header .dot { background: var(--red); }

.column-header .count {
  margin-left: auto;
  font-size: 12px;
  color: var(--muted);
  font-weight: 400;
  font-variant-numeric: tabular-nums;
}

.cards {
  flex: 1;
  overflow-y: auto;
  padding: 10px 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.cards::-webkit-scrollbar { width: 4px; }
.cards::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

.card {
  padding: 12px 14px;
  border-radius: 8px;
  border-left: 3px solid transparent;
  transition: background 0.2s;
}

.card:hover { background: rgba(255,255,255,0.03); }

.column.far .card { background: var(--green-bg); border-left-color: var(--green); }
.column.near .card { background: var(--yellow-bg); border-left-color: var(--yellow); }
.column.cliff .card { background: var(--red-bg); border-left-color: var(--red); }

.card-time {
  font-size: 11px;
  color: var(--muted);
  margin-bottom: 4px;
  display: flex;
  justify-content: space-between;
}

.card-reason {
  font-size: 13px;
  line-height: 1.5;
  color: var(--text);
}

.card-chunks {
  font-size: 11px;
  color: var(--muted);
  font-variant-numeric: tabular-nums;
  margin-top: 4px;
}

/* Timeline view */
.timeline {
  flex: 1;
  overflow-y: auto;
  padding: 20px 32px;
}

.timeline::-webkit-scrollbar { width: 4px; }
.timeline::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

.tl-date-group {
  margin-bottom: 24px;
}

.tl-date {
  font-size: 12px;
  font-weight: 600;
  color: var(--muted);
  margin-bottom: 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}

.tl-entry {
  display: flex;
  gap: 14px;
  padding: 10px 0;
  align-items: flex-start;
}

.tl-entry + .tl-entry {
  border-top: 1px solid rgba(255,255,255,0.03);
}

.tl-dot-col {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-top: 4px;
  flex-shrink: 0;
  width: 16px;
}

.tl-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}

.tl-dot.far { background: var(--green); }
.tl-dot.near { background: var(--yellow); }
.tl-dot.cliff { background: var(--red); }

.tl-content {
  flex: 1;
  min-width: 0;
}

.tl-time {
  font-size: 11px;
  color: var(--muted);
  font-variant-numeric: tabular-nums;
  margin-bottom: 2px;
}

.tl-reason {
  font-size: 13px;
  line-height: 1.5;
}

.tl-meta {
  font-size: 11px;
  color: var(--muted);
  margin-top: 3px;
}

.tl-distance-tag {
  display: inline-block;
  font-size: 11px;
  padding: 1px 8px;
  border-radius: 8px;
  font-weight: 600;
  margin-left: 6px;
}

.tl-distance-tag.far { background: rgba(74,222,128,0.15); color: var(--green); }
.tl-distance-tag.near { background: rgba(250,204,21,0.15); color: var(--yellow); }
.tl-distance-tag.cliff { background: rgba(248,113,113,0.15); color: var(--red); }

/* Plan panel */
.plan-panel {
  width: 420px;
  background: var(--surface);
  border-left: 1px solid rgba(255,255,255,0.06);
  display: none;
  flex-direction: column;
  flex-shrink: 0;
  overflow: hidden;
}

.plan-panel.open {
  display: flex;
}

.plan-header {
  padding: 14px 18px;
  font-size: 14px;
  font-weight: 600;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-shrink: 0;
}

.plan-close {
  cursor: pointer;
  color: var(--muted);
  font-size: 18px;
  line-height: 1;
  padding: 4px;
}

.plan-close:hover { color: var(--text); }

.plan-body {
  flex: 1;
  overflow-y: auto;
  padding: 18px;
  font-size: 13px;
  line-height: 1.7;
}

.plan-body::-webkit-scrollbar { width: 4px; }
.plan-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

.plan-body h1 { font-size: 17px; margin-bottom: 12px; color: var(--text); }
.plan-body h2 { font-size: 14px; margin: 18px 0 8px; color: var(--green); }
.plan-body h3 { font-size: 13px; margin: 14px 0 6px; color: var(--text); }
.plan-body p { margin-bottom: 8px; color: var(--text); opacity: 0.9; }
.plan-body ul, .plan-body ol { margin: 4px 0 10px 20px; }
.plan-body li { margin-bottom: 4px; opacity: 0.9; }
.plan-body code {
  background: rgba(255,255,255,0.06);
  padding: 1px 5px;
  border-radius: 3px;
  font-size: 12px;
}
.plan-body pre {
  background: rgba(0,0,0,0.3);
  padding: 12px;
  border-radius: 6px;
  overflow-x: auto;
  margin: 8px 0;
  font-size: 12px;
  line-height: 1.5;
}
.plan-body pre code { background: none; padding: 0; }

/* Empty state */
.empty {
  text-align: center;
  color: var(--muted);
  font-size: 13px;
  padding: 40px 20px;
  opacity: 0.5;
}

/* Message bar */
.msg-bar {
  display: none;
  border-bottom: 1px solid rgba(248,113,113,0.2);
  background: rgba(248,113,113,0.04);
  flex-shrink: 0;
  overflow: hidden;
}

.msg-bar.visible { display: block; }

.msg-bar-inner {
  padding: 10px 24px;
  display: flex;
  gap: 20px;
  align-items: flex-start;
}

.msg-letter {
  flex: 1;
  min-width: 0;
}

.msg-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--red);
  margin-bottom: 4px;
}

.msg-response .msg-label {
  color: var(--green);
}

.msg-text {
  font-size: 13px;
  line-height: 1.5;
  color: var(--text);
  opacity: 0.9;
  white-space: pre-wrap;
}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <span class="logo">shepherd</span>
    <div class="indicator" id="indicator"></div>
  </div>
  <div class="header-meta">
    <div class="goal" id="goal" title="Click to view PLAN.md">—</div>
    <div class="phase" id="phase"></div>
  </div>
  <div class="sheep-wrap" id="sheep">
    <div id="sheep-art"></div>
    <div class="sheep-ground"></div>
  </div>
  <div class="ratio-bar-wrap">
    <div class="ratio-bar" id="ratio-bar"></div>
    <span class="ratio-label" id="ratio-label"></span>
  </div>
  <div class="active-badge off" id="active-badge">OFF</div>
</div>

<div class="tabs">
  <div class="tab active" data-view="board">Board</div>
  <div class="tab" data-view="timeline">Timeline</div>
  <div class="tab" data-view="plan" id="tab-plan">PLAN.md</div>
</div>

<div class="msg-bar" id="msg-bar">
  <div class="msg-bar-inner">
    <div class="msg-letter" id="msg-letter">
      <div class="msg-label">shepherd</div>
      <div class="msg-text" id="msg-text"></div>
    </div>
    <div class="msg-letter msg-response" id="msg-response" style="display:none">
      <div class="msg-label">agent</div>
      <div class="msg-text" id="msg-response-text"></div>
    </div>
  </div>
</div>

<div class="main" id="main">
  <!-- Board view -->
  <div class="view active" id="view-board">
    <div class="board">
      <div class="column far">
        <div class="column-header">
          <span class="dot"></span>
          草原 far
          <span class="count" id="count-far">0</span>
        </div>
        <div class="cards" id="cards-far"></div>
      </div>
      <div class="column near">
        <div class="column-header">
          <span class="dot"></span>
          崖方向 near
          <span class="count" id="count-near">0</span>
        </div>
        <div class="cards" id="cards-near"></div>
      </div>
      <div class="column cliff">
        <div class="column-header">
          <span class="dot"></span>
          崖っぷち cliff
          <span class="count" id="count-cliff">0</span>
        </div>
        <div class="cards" id="cards-cliff"></div>
      </div>
    </div>
  </div>

  <!-- Timeline view -->
  <div class="view" id="view-timeline">
    <div class="timeline" id="timeline"></div>
  </div>

  <!-- Plan view -->
  <div class="view" id="view-plan">
    <div class="plan-body" id="plan-full" style="padding:24px 32px; max-width:800px;"></div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);

// --- Tab switching ---
let currentView = "board";
document.querySelectorAll(".tab").forEach(tab => {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    tab.classList.add("active");
    document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
    currentView = tab.dataset.view;
    $("view-" + currentView).classList.add("active");
    if (currentView === "timeline" && !timelineLoaded) loadTimeline();
  });
});

// Click goal to open plan tab
$("goal").addEventListener("click", () => {
  document.querySelector('.tab[data-view="plan"]').click();
});

// --- Sheep ---
const SHEEP = {
  far: [
    "╭▄███▄╮\n▐ °_° ▌\n ▀█▀█▀  ~w\n  ▐▌▐▌",
    "╭▄███▄╮\n▐ °_° ▌\n ▀█▀█▀ w~\n  ▐▌▐▌",
  ],
  near: [
    "╭▄███▄╮ !\n▐ O_O ▌\n ▀█▀█▀\n  ▐▌▐▌",
    "╭▄███▄╮!\n▐ O_O ▌\n ▀█▀█▀\n ▐▌ ▐▌",
  ],
  cliff: [
    "╭▄███▄╮!!\n▐ X_X ▌\n ▀█▀█▀\n ▐▌ ▐▌",
    "╮▄███▄╭!!\n▐ X_X ▌\n ▀█▀█▀\n  ▐▌▐▌",
  ]
};

let sheepFrame = 0;
let sheepDistance = "far";

let sheepTimer = null;

function updateSheep(distance) {
  const prev = sheepDistance;
  sheepDistance = distance || "far";
  const wrap = $("sheep");
  wrap.className = "sheep-wrap " + sheepDistance;
  if (prev !== sheepDistance) startSheepTimer();
}

function animateSheep() {
  const frames = SHEEP[sheepDistance] || SHEEP.far;
  sheepFrame = (sheepFrame + 1) % frames.length;
  $("sheep-art").textContent = frames[sheepFrame];
}

function startSheepTimer() {
  if (sheepTimer) clearInterval(sheepTimer);
  const speed = sheepDistance === "cliff" ? 300 : sheepDistance === "near" ? 600 : 1000;
  sheepTimer = setInterval(animateSheep, speed);
}

startSheepTimer();
animateSheep();

// --- Helpers ---
function relativeTime(iso) {
  const sec = Math.floor((Date.now() - new Date(iso)) / 1000);
  if (sec < 60) return sec + "秒前";
  const min = Math.floor(sec / 60);
  if (min < 60) return min + "分前";
  const hr = Math.floor(min / 60);
  if (hr < 24) return hr + "時間前";
  return Math.floor(hr / 24) + "日前";
}

function formatTime(iso) {
  return new Date(iso).toLocaleTimeString("ja-JP", { hour: "2-digit", minute: "2-digit", second: "2-digit" });
}

function formatDate(iso) {
  return new Date(iso).toLocaleDateString("ja-JP", { month: "long", day: "numeric", weekday: "short" });
}

function escapeHtml(s) {
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

// --- Minimal markdown renderer ---
function renderMarkdown(md) {
  let html = escapeHtml(md);
  // code blocks
  html = html.replace(/```([\s\S]*?)```/g, (_, code) => `<pre><code>${code.trim()}</code></pre>`);
  // inline code
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  // headings
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  // lists
  html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
  html = html.replace(/(<li>.*<\/li>\n?)+/g, m => '<ul>' + m + '</ul>');
  // bold
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // paragraphs (lines not already wrapped)
  html = html.replace(/^(?!<[hluop])((?!<!--).+)$/gm, '<p>$1</p>');
  // collapse multiple <p> of blank
  html = html.replace(/<p>\s*<\/p>/g, '');
  return html;
}

// --- Board card ---
function renderCard(entry) {
  const div = document.createElement("div");
  div.className = "card";
  div.innerHTML = `
    <div class="card-time">
      <span>${formatTime(entry.ts)}</span>
      <span>${relativeTime(entry.ts)}</span>
    </div>
    <div class="card-reason">${escapeHtml(entry.reason)}</div>
    <div class="card-chunks">${entry.chunk_lines} chunks</div>
  `;
  return div;
}

// --- Board refresh ---
let lastLogLen = -1;

async function refreshBoard() {
  try {
    const [logRes, planRes, statusRes, msgRes] = await Promise.all([
      fetch("/api/log"), fetch("/api/plan"), fetch("/api/status"), fetch("/api/messages")
    ]);
    const log = await logRes.json();
    const plan = await planRes.json();
    const msgs = await msgRes.json();
    const status = await statusRes.json();

    if (log.length !== lastLogLen) {
      lastLogLen = log.length;

      const buckets = { far: [], near: [], cliff: [] };
      for (const e of log) {
        if (buckets[e.distance]) buckets[e.distance].push(e);
      }

      for (const k of ["far", "near", "cliff"]) {
        buckets[k].reverse();
        const container = $("cards-" + k);
        container.innerHTML = "";
        if (buckets[k].length === 0) {
          container.innerHTML = '<div class="empty">No entries</div>';
        } else {
          for (const e of buckets[k]) container.appendChild(renderCard(e));
        }
        $("count-" + k).textContent = buckets[k].length;
      }

      const total = log.length || 1;
      $("ratio-bar").innerHTML =
        `<div class="seg far" style="width:${buckets.far.length/total*100}%"></div>` +
        `<div class="seg near" style="width:${buckets.near.length/total*100}%"></div>` +
        `<div class="seg cliff" style="width:${buckets.cliff.length/total*100}%"></div>`;
      $("ratio-label").textContent =
        `${buckets.far.length}/${buckets.near.length}/${buckets.cliff.length}`;

      const ind = $("indicator");
      ind.className = "indicator";
      if (log.length > 0) {
        const lastDist = log[log.length - 1].distance;
        ind.classList.add(lastDist);
        updateSheep(lastDist);
      }
    }

    $("goal").textContent = plan.goal || "—";
    $("phase").textContent = plan.phase ? "Phase: " + plan.phase : "";

    // Update plan view if raw available
    if (plan.raw) {
      $("plan-full").innerHTML = renderMarkdown(plan.raw);
    }

    const badge = $("active-badge");
    if (status.active) {
      badge.textContent = "ACTIVE";
      badge.className = "active-badge";
    } else {
      badge.textContent = "OFF";
      badge.className = "active-badge off";
    }

    // Messages
    const bar = $("msg-bar");
    if (msgs.message) {
      bar.classList.add("visible");
      $("msg-text").textContent = msgs.message;
      const respEl = $("msg-response");
      if (msgs.response) {
        respEl.style.display = "";
        $("msg-response-text").textContent = msgs.response;
      } else {
        respEl.style.display = "none";
      }
    } else {
      bar.classList.remove("visible");
    }
  } catch (e) {}
}

// --- Timeline ---
let timelineLoaded = false;

async function loadTimeline() {
  try {
    const res = await fetch("/api/log/all");
    const log = await res.json();
    timelineLoaded = true;

    // Group by date
    const groups = {};
    for (const e of log) {
      const dateKey = new Date(e.ts).toLocaleDateString("ja-JP");
      if (!groups[dateKey]) groups[dateKey] = { iso: e.ts, entries: [] };
      groups[dateKey].entries.push(e);
    }

    const container = $("timeline");
    container.innerHTML = "";

    // Reverse: newest date first
    const dateKeys = Object.keys(groups).reverse();
    for (const dk of dateKeys) {
      const g = groups[dk];
      const section = document.createElement("div");
      section.className = "tl-date-group";

      const dateHeader = document.createElement("div");
      dateHeader.className = "tl-date";
      dateHeader.textContent = formatDate(g.iso);
      section.appendChild(dateHeader);

      // Newest entry first within date
      const entries = g.entries.slice().reverse();
      for (const e of entries) {
        const row = document.createElement("div");
        row.className = "tl-entry";
        row.innerHTML = `
          <div class="tl-dot-col">
            <div class="tl-dot ${e.distance}"></div>
          </div>
          <div class="tl-content">
            <div class="tl-time">
              ${formatTime(e.ts)}
              <span class="tl-distance-tag ${e.distance}">${e.distance}</span>
            </div>
            <div class="tl-reason">${escapeHtml(e.reason)}</div>
            <div class="tl-meta">${e.chunk_lines} chunks</div>
          </div>
        `;
        section.appendChild(row);
      }

      container.appendChild(section);
    }

    if (dateKeys.length === 0) {
      container.innerHTML = '<div class="empty">No history</div>';
    }
  } catch (e) {}
}

// --- Init ---
refreshBoard();
setInterval(refreshBoard, 5000);
</script>
</body>
</html>
